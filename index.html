*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

/* ── THEME ── */
[data-theme="dark"] {
  --bg: #080c10;
  --surface: #0e1318;
  --surface2: #141c24;
  --card: #111820;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(99,210,255,0.35);
  --text: #e8f0f8;
  --text2: #7a92a8;
  --text3: #3d5266;
  --accent: #63d2ff;
  --accent-dim: rgba(99,210,255,0.1);
  --accent-glow: rgba(99,210,255,0.2);
  --green: #4dffa0;
  --green-dim: rgba(77,255,160,0.1);
  --orange: #ffb347;
  --tag-bg: rgba(99,210,255,0.06);
  --shadow: rgba(0,0,0,0.6);
  --mesh1: #0d1f2d;
  --mesh2: #091824;
  --nav-bg: rgba(8,12,16,0.85);
}
[data-theme="light"] {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #eef1f5;
  --card: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(0,120,180,0.4);

  --text2: #546e7a;
  --text3: #90a4ae;

  --accent-glow: rgba(0,133,199,0.15);
  --green: #00875a;
  --green-dim: rgba(0,135,90,0.08);
  --orange: #d4650a;
  --tag-bg: rgba(0,133,199,0.06);
  --shadow: rgba(0,0,0,0.12);
  --mesh1: #e8f4fb;
  --mesh2: #ddeef8;
  --nav-bg: rgba(245,247,250,0.88);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
  transition: background 0.4s ease, color 0.4s ease;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* MESH BACKGROUND */
.mesh-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.mesh-bg::before {
  content: '';
  position: absolute;
  width: 900px; height: 900px;
  top: -200px; right: -200px;
  background: radial-gradient(circle, var(--mesh1) 0%, transparent 65%);
  animation: meshDrift 18s ease-in-out infinite alternate;
}
.mesh-bg::after {
  content: '';
  position: absolute;
  width: 700px; height: 700px;
  bottom: -100px; left: -100px;
  background: radial-gradient(circle, var(--mesh2) 0%, transparent 65%);
  animation: meshDrift 14s ease-in-out infinite alternate-reverse;
}
@keyframes meshDrift {
  from { transform: translate(0,0) scale(1); }
  to { transform: translate(40px, 30px) scale(1.08); }
}

/* NOISE */
.noise {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* GLOBAL Z */
nav, #root > * { position: relative; z-index: 2; }

/* KEYFRAMES */
@keyframes fadeUp { from { opacity:0; transform:translateY(32px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
@keyframes floatY { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
@keyframes countUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
@keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }

/* MOBILE */
@media (max-width: 640px) { .hide-mobile { display: none !important; } }
@media (min-width: 641px) { .hide-desktop { display: none !important; } }
@media (max-width: 900px) { .hide-lg { display: none !important; } }
</style>

function useInView(opts = {}) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } }, { threshold: opts.threshold || 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, vis];
}

function useScrollSpy() {
  const [active, setActive] = useState('');
  useEffect(() => {
    const ids = ['about','skills','experience','projects','contact'];
    const fn = () => { let c = ''; ids.forEach(id => { const el = document.getElementById(id); if (el && window.scrollY >= el.offsetTop - 160) c = id; }); setActive(c); };
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return active;
}

function useCountUp(target, trigger) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!trigger) return;
    const isFloat = String(target).includes('.');
    const num = parseFloat(target);
    let start = 0; const dur = 1400; const step = 16;
    const inc = num / (dur / step);
    const timer = setInterval(() => {
      start += inc;
      if (start >= num) { setVal(isFloat ? num.toFixed(4) : Math.floor(num)); clearInterval(timer); }
      else setVal(isFloat ? start.toFixed(4) : Math.floor(start));
    }, step);
    return () => clearInterval(timer);
  }, [trigger, target]);
  return val;
}

function useTypewriter(words) {
  const [idx, setIdx] = useState(0);
  const [txt, setTxt] = useState('');
  const [del, setDel] = useState(false);
  useEffect(() => {
    const word = words[idx];
    if (!del && txt === word) { const t = setTimeout(() => setDel(true), 2200); return () => clearTimeout(t); }
    if (del && txt === '') { setDel(false); setIdx(i => (i + 1) % words.length); return; }
    const t = setTimeout(() => setTxt(del ? txt.slice(0, -1) : word.slice(0, txt.length + 1)), del ? 38 : 75);
    return () => clearTimeout(t);
  }, [txt, del, idx, words]);
  return txt;
}

}

              <div style={{ padding: '1rem', background: 'var(--accent-dim)', border: '1px solid var(--border)', borderRadius: 6 }}>
                <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: '0.88rem', color: 'var(--text)' }}>B.Sc. Information Technology</div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.65rem', color: 'var(--text3)', marginTop: '0.25rem' }}>University of Mumbai · 2018 – 2021</div>
              </div>
            </div>
          </Reveal>
        </div>
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════
   BACK TO TOP
══════════════════════════════════════════ */
function BackToTop() {
  const [show, setShow] = useState(false);
  const [hov, setHov] = useState(false);
  useEffect(() => { const h = () => setShow(window.scrollY > 500); window.addEventListener('scroll', h, { passive: true }); return () => window.removeEventListener('scroll', h); }, []);
  return (
    <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        position: 'fixed', bottom: '2rem', right: '2rem', zIndex: 400,
        width: 44, height: 44, borderRadius: '50%',
        background: hov ? 'var(--accent)' : 'var(--surface)',
        border: '1px solid var(--border)',
        color: hov ? 'var(--bg)' : 'var(--accent)',
        fontSize: '1rem', cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'all 0.3s cubic-bezier(0.22,1,0.36,1)',
        opacity: show ? 1 : 0, transform: show ? 'none' : 'translateY(12px) scale(0.8)',
        pointerEvents: show ? 'all' : 'none',
        boxShadow: hov ? '0 0 20px var(--accent-glow)' : 'none',
      }}>↑</button>
  );
}

/* ══════════════════════════════════════════
   FOOTER
══════════════════════════════════════════ */
function Footer() {
  return (
    <footer style={{ borderTop: '1px solid var(--border)', padding: '1.8rem clamp(1.2rem,6vw,5rem)', display: 'flex', flexWrap: 'wrap', justifyContent: 'space-between', alignItems: 'center', gap: '0.5rem' }}>
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.65rem', color: 'var(--text3)' }}>
        © 2025 <span style={{ color: 'var(--accent)' }}>Sanan Shaikh</span> · Built with React
      </div>
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.65rem', color: 'var(--text3)' }}>
        Data Scientist · Sawantwadi, Maharashtra
      </div>
    </footer>
  );
}

/* ══════════════════════════════════════════
   APP
══════════════════════════════════════════ */
function App() {
  const [dark, setDark] = useState(true);
  const toggle = useCallback(() => {
    setDark(d => {
      const next = !d;
      document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');
      return next;
    });
  }, []);

  return (
    <ThemeCtx.Provider value={{ dark, toggle }}>
      <Nav />
      <SideProgress />
      <Hero />
      <Skills />
      <Experience />
      <Projects />
      <Contact />
      <Footer />
      <BackToTop />
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
