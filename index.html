function initParticles(dark){
  const canvas=document.getElementById("particles");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  let W=canvas.width=window.innerWidth,H=canvas.height=window.innerHeight;
  const count=Math.floor((W*H)/14000);
  const col=dark?"rgba(0,200,240,":"rgba(0,136,187,";
  const pts=Array.from({length:count},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.2+.3,o:Math.random()*.4+.1}));
  let raf;
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=col+p.o+")";ctx.fill();});
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=col+(0.07*(1-d/100))+")";ctx.lineWidth=.5;ctx.stroke();}}
    raf=requestAnimationFrame(draw);
  }
  draw();
  const onR=()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;};
  window.addEventListener("resize",onR);
  return()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",onR);};
}

function useInView(threshold=0.12){
  const ref=useRef(null);const[vis,setVis]=useState(false);
  useEffect(()=>{const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.disconnect();}},{threshold});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();},[]);
  return[ref,vis];
}

function useScrollSpy(){
  const[active,setActive]=useState("");
  useEffect(()=>{
    const ids=["skills","experience","projects","contact"];
    const h=()=>{let c="";ids.forEach(id=>{const el=document.getElementById(id);if(el&&window.scrollY>=el.offsetTop-140)c=id;});setActive(c);};
    window.addEventListener("scroll",h,{passive:true});return()=>window.removeEventListener("scroll",h);
  },[]);return active;
}

function useTypewriter(words,speed=80,pause=1800){
  const[display,setDisplay]=useState("");const[wIdx,setWIdx]=useState(0);const[cIdx,setCIdx]=useState(0);const[deleting,setDeleting]=useState(false);
  useEffect(()=>{
    const cur=words[wIdx];
    const t=setTimeout(()=>{
      if(!deleting){setDisplay(cur.slice(0,cIdx+1));if(cIdx+1===cur.length)setTimeout(()=>setDeleting(true),pause);else setCIdx(c=>c+1);}
      else{setDisplay(cur.slice(0,cIdx-1));if(cIdx-1===0){setDeleting(false);setWIdx(w=>(w+1)%words.length);setCIdx(0);}else setCIdx(c=>c-1);}
    },deleting?speed/2:speed);
    return()=>clearTimeout(t);
  },[display,wIdx,cIdx,deleting]);
  return display;
}

  return <div ref={r} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{position:"relative",marginBottom:"1.3rem",padding:"1.8rem",background:hov?t.bg2:t.card,border:`1px solid ${hov?t.accent+"40":t.border}`,borderRadius:8,opacity:v?1:0,transform:v?"translateX(0)":"translateX(-18px)",transition:`opacity 0.6s ${delay}ms,transform 0.6s ${delay}ms,border-color 0.3s,box-shadow 0.3s`,boxShadow:hov?`0 10px 28px ${t.shadow}`:"none"}}>
    <div style={{position:"absolute",left:"-2.4rem",top:"2rem",width:9,height:9,background:t.accent,borderRadius:"50%",boxShadow:`0 0 12px ${t.accent}`}}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"0.5rem",marginBottom:"0.4rem"}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1rem",fontWeight:700,color:t.text}}>{title}</div>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.64rem",color:t.accent,background:t.accent2,border:`1px solid ${t.accent}33`,padding:"0.2rem 0.6rem",borderRadius:2,whiteSpace:"nowrap"}}>{dates}</div>
    </div>
    <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.7rem",color:t.muted,marginBottom:"1rem"}}><span style={{color:t.accent}}>{company}</span> · {location}</div>
    <ul style={{listStyle:"none"}}>
      {bullets.map((b,i)=><li key={i} style={{fontSize:"0.84rem",color:t.muted,lineHeight:1.75,padding:"0.22rem 0 0.22rem 1rem",position:"relative"}}><span style={{position:"absolute",left:0,color:t.accent,fontSize:"0.52rem",top:"0.52rem"}}>▸</span><span dangerouslySetInnerHTML={{__html:b}}/></li>)}
    </ul>
  </div>;
}

function Experience({t}){
  return <section id="experience" style={{padding:"6rem clamp(1.2rem,5vw,4rem)",background:`linear-gradient(180deg,transparent,${t.accent2},transparent)`,position:"relative",zIndex:1}}>
    <div style={{maxWidth:1200,margin:"0 auto"}}>
      <SectionLabel num="02" text="Experience" t={t}/>
      <SectionTitle t={t}>Work <span style={{color:t.accent}}>History</span></SectionTitle>
      <div style={{position:"relative",paddingLeft:"2rem"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:1,background:`linear-gradient(to bottom,${t.accent},transparent)`,opacity:0.3}}/>
        {expData.map((e,i)=><ExpItem key={e.title} {...e} delay={i*100} t={t}/>)}
      </div>
    </div>
  </section>;
}

function ProjectCard({num,title,tech,desc,badge,isAccent,delay,t}){
  const[r,v]=useInView();const[hov,setHov]=useState(false);
  const color=isAccent?t.accent:t.green;
  return <div ref={r} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:t.card,border:`1px solid ${hov?t.accent+"48":t.border}`,borderRadius:8,padding:"1.8rem",display:"flex",flexDirection:"column",opacity:v?1:0,transform:v?(hov?"translateY(-6px)":"translateY(0)"):"translateY(26px)",transition:`opacity 0.6s ${delay}ms ease,transform 0.3s ease,border-color 0.3s,box-shadow 0.3s`,boxShadow:hov?`0 22px 44px ${t.shadow}`:"none",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${color},transparent)`,transform:hov?"scaleX(1)":"scaleX(0)",transformOrigin:"left",transition:"transform 0.4s ease"}}/>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:"2.6rem",fontWeight:800,color:t.accent+"10",lineHeight:1,marginBottom:"0.3rem"}}>{num}</div>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:"0.98rem",fontWeight:700,color:t.text,marginBottom:"0.4rem"}}>{title}</div>
    <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.6rem",color:t.accent,marginBottom:"0.9rem"}}>{tech}</div>
    <div style={{fontSize:"0.83rem",color:t.muted,lineHeight:1.75,flex:1}}>{desc}</div>
    <div style={{display:"inline-block",marginTop:"1.1rem",fontFamily:"'DM Mono',monospace",fontSize:"0.64rem",color,background:`${color}14`,border:`1px solid ${color}33`,padding:"0.25rem 0.6rem",borderRadius:2}}>{badge}</div>
  </div>;
}

function Projects({t}){
  const[filter,setFilter]=useState("All");
  const filters=["All","ML","EDA"];
  const filtered=filter==="All"?projectsData:projectsData.filter(p=>p.category===filter);
  return <section id="projects" style={{padding:"6rem clamp(1.2rem,5vw,4rem)",maxWidth:1200,margin:"0 auto",position:"relative",zIndex:1}}>
    <SectionLabel num="03" text="Projects" t={t}/>
    <SectionTitle t={t}>Featured <span style={{color:t.accent}}>Work</span></SectionTitle>
    <div style={{display:"flex",gap:"0.6rem",marginBottom:"2rem",flexWrap:"wrap"}}>
      {filters.map(f=><button key={f} onClick={()=>setFilter(f)} style={{fontFamily:"'DM Mono',monospace",fontSize:"0.68rem",letterSpacing:"0.1em",textTransform:"uppercase",padding:"0.45rem 1.1rem",borderRadius:2,border:`1px solid ${filter===f?t.accent:t.border}`,background:filter===f?t.accent2:"transparent",color:filter===f?t.accent:t.muted,cursor:"pointer",transition:"all 0.2s"}}>{f}</button>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:"1.1rem"}}>
      {filtered.map((p,i)=><ProjectCard key={p.num} {...p} delay={i*80} t={t}/>)}
    </div>
  </section>;
}

function Contact({t}){
  const[r,v]=useInView();
  const links=[
    {icon:"✉",label:"shaikhsanan.04@gmail.com",href:"mailto:shaikhsanan.04@gmail.com"},
    {icon:"📱",label:"+91 70219 56965",href:"tel:+917021956965"},
    {icon:"💼",label:"linkedin.com/in/shaikhsanan04",href:"https://www.linkedin.com/in/shaikhsanan04/"},
    {icon:"⌥",label:"github.com/shaikhsanan04",href:"https://github.com/shaikhsanan04"},
  ];
  return <section id="contact" style={{padding:"6rem clamp(1.2rem,5vw,4rem)",maxWidth:1200,margin:"0 auto",position:"relative",zIndex:1}}>
    <SectionLabel num="04" text="Contact" t={t}/>
    <SectionTitle t={t}>Let's <span style={{color:t.accent}}>Connect</span></SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:"2.5rem",alignItems:"start"}}>
      <div ref={r} style={{opacity:v?1:0,transform:v?"translateY(0)":"translateY(22px)",transition:"all 0.6s"}}>
        <p style={{fontSize:"0.93rem",color:t.muted,lineHeight:1.9,marginBottom:"1.8rem"}}>Actively seeking entry-level <span style={{color:t.text}}>Data Scientist</span>, <span style={{color:t.text}}>Data Analyst</span>, or <span style={{color:t.text}}>ML Engineer</span> roles. Open to remote &amp; on-site.</p>
        <div style={{display:"flex",flexDirection:"column",gap:"0.7rem"}}>
          {links.map(({icon,label,href})=><a key={href} href={href} target={href.startsWith("http")?"_blank":"_self"} rel="noreferrer"
            onMouseEnter={e=>{e.currentTarget.style.borderColor=t.accent;e.currentTarget.style.color=t.accent;e.currentTarget.style.transform="translateX(5px)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=t.border;e.currentTarget.style.color=t.text;e.currentTarget.style.transform="translateX(0)";}}
            style={{display:"flex",alignItems:"center",gap:"0.9rem",fontFamily:"'DM Mono',monospace",fontSize:"0.74rem",color:t.text,textDecoration:"none",padding:"0.85rem 1rem",background:t.card,border:`1px solid ${t.border}`,borderRadius:6,transition:"all 0.2s"}}>
            <span style={{fontSize:"0.95rem"}}>{icon}</span>{label}
          </a>)}
        </div>
      </div>
      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:8,padding:"1.8rem",opacity:v?1:0,transform:v?"translateY(0)":"translateY(22px)",transition:"all 0.6s 0.15s"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.1rem",fontWeight:700,color:t.text,marginBottom:"1.1rem"}}>Certifications</div>
        <div style={{display:"flex",flexDirection:"column",gap:"0.6rem",marginBottom:"1.8rem"}}>
          {certsData.map(c=><div key={c} onMouseEnter={e=>e.currentTarget.style.borderColor=t.accent+"4d"} onMouseLeave={e=>e.currentTarget.style.borderColor=t.border}
            style={{display:"flex",alignItems:"center",gap:"0.8rem",padding:"0.8rem 1rem",background:t.accent2,border:`1px solid ${t.border}`,borderRadius:6,fontSize:"0.83rem",color:t.text,transition:"border-color 0.2s"}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:t.accent,boxShadow:`0 0 8px ${t.accent}`,flexShrink:0}}/>{c}
          </div>)}
        </div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:"0.95rem",fontWeight:700,color:t.text,marginBottom:"0.8rem"}}>Education</div>
        <div style={{padding:"1rem",background:t.accent2,border:`1px solid ${t.border}`,borderRadius:6}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.86rem",color:t.text}}>B.Sc. Information Technology</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.65rem",color:t.muted,marginTop:"0.25rem"}}>University of Mumbai · 2018 – 2021</div>
        </div>
      </div>
    </div>
  </section>;
}

function BackToTop({t}){
  const[show,setShow]=useState(false);
  useEffect(()=>{const h=()=>setShow(window.scrollY>400);window.addEventListener("scroll",h,{passive:true});return()=>window.removeEventListener("scroll",h);},[]);
  return <button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
    onMouseEnter={e=>{e.currentTarget.style.background=t.accent;e.currentTarget.style.color="#07090e";e.currentTarget.style.transform="translateY(-3px)";}}
    onMouseLeave={e=>{e.currentTarget.style.background=t.card;e.currentTarget.style.color=t.accent;e.currentTarget.style.transform="translateY(0)";}}
    style={{position:"fixed",bottom:"2rem",right:"2rem",zIndex:400,width:44,height:44,borderRadius:"50%",background:t.card,color:t.accent,border:`1px solid ${t.accent}`,fontSize:"1.1rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.3s",opacity:show?1:0,pointerEvents:show?"auto":"none",transform:show?"translateY(0)":"translateY(10px)",boxShadow:`0 4px 20px ${t.shadow}`}}>↑</button>;
}

function Footer({t}){
  return <footer style={{position:"relative",zIndex:1,borderTop:`1px solid ${t.border}`,padding:"1.6rem clamp(1.2rem,5vw,4rem)",display:"flex",flexWrap:"wrap",justifyContent:"space-between",alignItems:"center",gap:"0.5rem"}}>
    <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.66rem",color:t.muted}}>© 2025 <span style={{color:t.accent}}>Sanan Shaikh</span>. Built with passion.</div>
    <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.66rem",color:t.muted}}>Data Scientist · Sawantwadi, India</div>
  </footer>;
}

function App(){
  const[dark,setDark]=useState(true);
  const t=dark?T.dark:T.light;
  useEffect(()=>{document.body.className=dark?"dark":"light";const cleanup=initParticles(dark);return cleanup;},[dark]);
  return <>
    <Nav t={t} dark={dark} setDark={setDark}/>
    <Hero t={t}/>
    <Skills t={t}/>
    <Experience t={t}/>
    <Projects t={t}/>
    <Contact t={t}/>
    <Footer t={t}/>
    <BackToTop t={t}/>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
